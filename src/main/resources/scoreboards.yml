# This is Tofu's scoreboard system.
# It's a simple system that allows you to create a scoreboard with an id
#and use it anywhere in the plugin (/showboard <player> <id>)

main-scoreboard: main

main:
  update: false # Set to true to update the scoreboard every x ticks
  update-interval: 20 # This is the amount of ticks between each update. This setting is ignored if update is set to false.
  title: "Tofu Scoreboard"
  lines:
    - "&a&lTofu &7- &f%player_count% &7players"
    - "&b&lTofu &7- &f%online_count% &7online"
    - "&c&lTofu &7- &f%server_count% &7servers"